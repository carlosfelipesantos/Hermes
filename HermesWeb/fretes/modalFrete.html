<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Detalhes do Frete</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/fretes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-card {
      background: #fff;
      width: 100%;
      max-width: 520px;
      border-radius: 18px;
      padding: 28px;
      position: relative;
      box-shadow: 0 20px 50px rgba(0,0,0,0.18);
    }

    .btn-close {
      position: absolute;
      top: 14px;
      right: 14px;
      border: none;
      background: #f1f1f1;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
    }

    .modal-card h2 {
      margin-top: 0;
      margin-bottom: 20px;
      color: #111827;
    }

    .modal-info p {
      margin: 10px 0;
      color: #374151;
    }

    .status {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status.pendente {
      background: #fef3c7;
      color: #92400e;
    }

    .status.aceito {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .status.concluido {
      background: #dcfce7;
      color: #166534;
    }

    .btn {
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .btn-primary {
      background: #10b981;
      color: white;
    }

    .btn-large {
      width: 100%;
      justify-content: center;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="modal-overlay" id="modalFrete">
    <div class="modal-card animate-modal">
      <button class="btn-close" onclick="fecharModal()">✖</button>

      <h2>Detalhes do Frete</h2>

      <div class="modal-info">
        <p><strong>Origem:</strong> São José do Rio Preto - SP</p>
        <p><strong>Destino:</strong> Santa Fé do Sul - SP</p>
        <p><strong>Peso:</strong> 85 kg</p>
        <p><strong>Carga:</strong> Equipamentos eletrônicos</p>
        <p><strong>Cliente:</strong> 102</p>
        <p><strong>Status:</strong>
          <span class="status aceito">aceito</span>
        </p>
      </div>

      <form action="#" method="post" style="margin-top:1rem;">
        <input type="hidden" name="action" value="aceitar">
        <input type="hidden" name="idFrete" value="15">

        <button class="btn btn-primary btn-large" type="button">
          <i class="fas fa-check"></i> Aceitar Frete
        </button>
      </form>
    </div>
  </div>

  <script>
    function fecharModal() {
      document.getElementById('modalFrete').style.display = 'none';
    }
  </script>

</body>
</html>
