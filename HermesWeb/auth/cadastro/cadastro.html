<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Hermes Sistema de Fretes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/cadastro.css">
</head>

<body class="login-body">

  <div class="alert-overlay" id="alertaDemo" style="display:none;">
    <div class="alert-box success">
      <i class="fas fa-check-circle"></i>
      <span>Cadastro visual enviado com sucesso.</span>
    </div>
  </div>

  <div class="login-container">
    <div class="login-card">

      <div class="login-header">
        <div class="login-logo">
          <a href="index.html" class="nav-logo">
            <img src="assets/images/LogoOficial.png" alt="Logo Hermes" class="logo-img">
          </a>
        </div>

        <h1 class="login-title">Crie sua conta</h1>
        <p class="login-subtitle">Preencha os campos abaixo para se cadastrar</p>
      </div>

      <form class="login-form" method="POST" action="#" id="cadastroForm">

        <div class="form-group">
          <label for="nome" class="form-label">
            <i class="fas fa-user"></i>
            Nome completo
          </label>
          <input type="text" id="nome" name="nome" class="form-input" required>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">
            <i class="fas fa-envelope"></i>
            E-mail
          </label>
          <input type="email" id="email" name="email" class="form-input" value="" required>
        </div>

        <div class="form-group">
          <label for="senha" class="form-label">
            <i class="fas fa-lock"></i>
            Senha
          </label>
          <input type="password" id="senha" name="senha" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-user-tag"></i> Tipo de Usuário
          </label>

          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="tipoUsuario" value="cliente" required onclick="toggleTransportador(false)">
              <span>Sou Cliente</span>
            </label>

            <label class="radio-option">
              <input type="radio" name="tipoUsuario" value="transportador" required onclick="toggleTransportador(true)">
              <span>Sou Transportador</span>
            </label>
          </div>

          <div id="camposTransportador" class="transportador-bloco">
            <div class="login-divider"><span>Informações do Transportador</span></div>

            <div class="form-group">
              <label for="documento" class="form-label">
                <i class="fas fa-id-card"></i>
                Documento (CPF ou CNPJ)
              </label>
              <input type="text" id="documento" name="documento" class="form-input" oninput="mascararDocumento(this)">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="telefone" class="form-label">
            <i class="fas fa-phone"></i>
            Telefone
          </label>
          <input type="text" id="telefone" name="telefone" class="form-input" required oninput="mascararTelefone(this)">
        </div>

        <div class="form-group">
          <label for="estado" class="form-label">
            <i class="fas fa-flag"></i>
            Estado (UF)
          </label>
          <select id="estado" name="estado" class="form-input" required>
            <option value="" disabled selected>Selecione</option>
            <option value="AC">AC</option>
            <option value="AL">AL</option>
            <option value="AP">AP</option>
            <option value="AM">AM</option>
            <option value="BA">BA</option>
            <option value="CE">CE</option>
            <option value="DF">DF</option>
            <option value="ES">ES</option>
            <option value="GO">GO</option>
            <option value="MA">MA</option>
            <option value="MT">MT</option>
            <option value="MS">MS</option>
            <option value="MG">MG</option>
            <option value="PA">PA</option>
            <option value="PB">PB</option>
            <option value="PR">PR</option>
            <option value="PE">PE</option>
            <option value="PI">PI</option>
            <option value="RJ">RJ</option>
            <option value="RN">RN</option>
            <option value="RS">RS</option>
            <option value="RO">RO</option>
            <option value="RR">RR</option>
            <option value="SC">SC</option>
            <option value="SP">SP</option>
            <option value="SE">SE</option>
            <option value="TO">TO</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cidade" class="form-label">
            <i class="fas fa-city"></i>
            Cidade
          </label>
          <input type="text" id="cidade" name="cidade" class="form-input" required>
        </div>

        <div class="form-group">
          <label for="endereco" class="form-label">
            <i class="fas fa-map-marker-alt"></i>
            Endereço
          </label>
          <input type="text" id="endereco" name="endereco" class="form-input" required>
        </div>

        <button type="submit" class="btn-login">
          <span class="btn-text">Cadastrar</span>
          <i class="fas fa-user-plus btn-icon"></i>
        </button>

        <div class="register-button">
          <p>Já possui conta? <a href="login.html">Faça o login</a></p>
        </div>
      </form>

      <div class="login-footer">
        <p>Voltar para <a href="index.html">página inicial</a></p>
      </div>
    </div>
  </div>

  <script>
    function toggleTransportador(mostrar) {
      const bloco = document.getElementById('camposTransportador');
      const documento = document.getElementById('documento');

      if (mostrar) {
        bloco.classList.add('active');
        documento.setAttribute('required', 'required');
      } else {
        bloco.classList.remove('active');
        documento.removeAttribute('required');
        documento.value = '';
      }
    }

    function mascararTelefone(input) {
      let v = input.value.replace(/\D/g, '');

      if (v.length > 11) v = v.slice(0, 11);

      if (v.length > 10) {
        v = v.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
      } else if (v.length > 6) {
        v = v.replace(/^(\d{2})(\d{4,5})(\d{0,4}).*/, '($1) $2-$3');
      } else if (v.length > 2) {
        v = v.replace(/^(\d{2})(\d+)/, '($1) $2');
      } else if (v.length > 0) {
        v = v.replace(/^(\d*)/, '($1');
      }

      input.value = v;
    }

    function mascararDocumento(input) {
      let v = input.value.replace(/\D/g, '');

      if (v.length <= 11) {
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      } else {
        v = v.slice(0, 14);
        v = v.replace(/^(\d{2})(\d)/, '$1.$2');
        v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
        v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
        v = v.replace(/(\d{4})(\d)/, '$1-$2');
      }

      input.value = v;
    }

    document.getElementById('cadastroForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const alerta = document.getElementById('alertaDemo');
      alerta.style.display = 'block';

      setTimeout(() => {
        alerta.style.display = 'none';
      }, 3000);
    });
  </script>
</body>
</html>
