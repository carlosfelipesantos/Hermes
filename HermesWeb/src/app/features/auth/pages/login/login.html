<div class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <a routerLink="/" class="nav-logo">
            <img src="assets/images/LogoOficial.png" alt="Logo Hermes" class="logo-img">
          </a>
        </div>
        <h1 class="login-title">Bem-vindo</h1>
        <p class="login-subtitle">Entre em sua conta para continuar</p>
      </div>

      <div class="message error animated-message" *ngIf="errorMessage">
        <i class="fas fa-exclamation-circle"></i>
        <span>{{ errorMessage }}</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group floating animated-input">
          <input type="email" id="email" formControlName="email" class="form-input" placeholder=" ">
          <label for="email" class="form-label">
            <i class="fas fa-envelope"></i> E-mail
          </label>
          <div class="input-focus-line"></div>
          <div class="invalid-feedback" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            E-mail válido é obrigatório.
          </div>
        </div>

        <div class="form-group floating animated-input">
          <input [type]="mostrarSenha ? 'text' : 'password'" id="senha" formControlName="senha" class="form-input" placeholder=" ">
          <label for="senha" class="form-label">
            <i class="fas fa-lock"></i> Senha
          </label>
          <button type="button" class="password-toggle" (click)="toggleSenha()">
            <i class="fas" [class.fa-eye]="!mostrarSenha" [class.fa-eye-slash]="mostrarSenha"></i>
          </button>
          <div class="input-focus-line"></div>
        </div>

        <div class="form-options animated-input">
          <label class="checkbox-container">
            <input type="checkbox" formControlName="lembrar">
            <span class="checkmark"></span> Lembrar de mim
          </label>
          <a href="#" class="forgot-password">Esqueci minha senha</a>
        </div>

        <button type="submit" class="btn-login animated-input" [disabled]="loading">
          <span class="btn-text">{{ loading ? 'Entrando...' : 'Entrar' }}</span>
          <i class="fas fa-sign-in-alt btn-icon"></i>
          <div class="btn-shine"></div>
        </button>

        <div class="register-button animated-input">
          <p>Não possui conta? <a routerLink="/auth/cadastro">Cadastre-se</a></p>
        </div>
      </form>

      <div class="login-footer animated-input">
        <p>Voltar para <a routerLink="/">página inicial</a></p>
      </div>
    </div>
  </div>
</div>
