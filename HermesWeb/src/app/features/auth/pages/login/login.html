<div class="login-body">
  <div class="floating-elements">
    <div class="floating-element element-1"></div>
    <div class="floating-element element-2"></div>
    <div class="floating-element element-3"></div>
    <div class="floating-element element-4"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <a routerLink="/" class="nav-logo">
            <img
              src="/src/assets/images/LogoOficial.png"
              alt="Logo Hermes"
              class="logo-img"
            >
          </a>
        </div>

        <h1 class="login-title">Bem-vindo</h1>
        <p class="login-subtitle">Entre em sua conta para continuar</p>
      </div>

      <div class="message {{ tipoMensagem }} animated-message" *ngIf="mensagem">
        <i class="fas fa-exclamation-circle"></i>
        <span>{{ mensagem }}</span>
      </div>

      <form class="login-form" (ngSubmit)="entrar()">
        <div class="form-group floating animated-input" data-delay="100">
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder=" "
            [(ngModel)]="email"
            required
          >
          <label for="email" class="form-label">
            <i class="fas fa-envelope"></i>
            E-mail
          </label>
          <div class="input-focus-line"></div>
        </div>

        <div class="form-group floating animated-input" data-delay="200">
          <input
            [type]="mostrarSenha ? 'text' : 'password'"
            id="senha"
            name="senha"
            class="form-input"
            placeholder=" "
            [(ngModel)]="senha"
            required
          >
          <label for="senha" class="form-label">
            <i class="fas fa-lock"></i>
            Senha
          </label>

          <button type="button" class="password-toggle" aria-label="Mostrar senha" (click)="toggleSenha()">
            <i class="fas" [class.fa-eye]="!mostrarSenha" [class.fa-eye-slash]="mostrarSenha"></i>
          </button>

          <div class="input-focus-line"></div>
        </div>

        <div class="form-options animated-input" data-delay="300">
          <label class="checkbox-container">
            <input type="checkbox" name="lembrar" [(ngModel)]="lembrar">
            <span class="checkmark"></span>
            Lembrar de mim
          </label>

          <a href="#" class="forgot-password">Esqueci minha senha</a>
        </div>

        <button type="submit" class="btn-login animated-input" data-delay="400">
          <span class="btn-text">Entrar</span>
          <div class="btn-loader"></div>
          <i class="fas fa-sign-in-alt btn-icon"></i>
          <div class="btn-shine"></div>
        </button>

        <div class="register-button animated-input" data-delay="500">
          <p>Não possui conta? <a routerLink="/auth/cadastro">Cadastre-se</a></p>
        </div>
      </form>

      <div class="login-footer animated-input" data-delay="500">
        <p>Voltar para <a routerLink="/">página inicial</a></p>
      </div>
    </div>
  </div>
</div>
