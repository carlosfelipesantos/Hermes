<div class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <a routerLink="/" class="nav-logo">
            <img
              src="assets/images/LogoOficial.png"
              alt="Logo Hermes"
              class="logo-img"
            >
          </a>
        </div>

        <h1 class="login-title">Crie sua conta</h1>
        <p class="login-subtitle">
          Preencha os campos abaixo para começar
        </p>
      </div>

      <form class="login-form">
        <div class="form-group floating animated-input">
          <input type="text" class="form-input" placeholder=" " required>
          <label class="form-label">
            <i class="fas fa-user"></i>
            Nome completo
          </label>
          <div class="input-focus-line"></div>
        </div>

        <div class="form-group floating animated-input">
          <input type="email" class="form-input" placeholder=" " required>
          <label class="form-label">
            <i class="fas fa-envelope"></i>
            E-mail
          </label>
          <div class="input-focus-line"></div>
        </div>

        <div class="form-group floating animated-input">
          <input type="password" class="form-input" placeholder=" " required>
          <label class="form-label">
            <i class="fas fa-lock"></i>
            Senha
          </label>
          <div class="input-focus-line"></div>
        </div>

        <div class="form-group animated-input">
          <label class="form-label" style="position: relative; transform: none; top: 0; margin-bottom: 0.5rem;">
            <i class="fas fa-user-tag"></i>
            Tipo de usuário
          </label>

          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="tipoUsuario" value="cliente">
              Cliente
            </label>

            <label class="radio-option">
              <input type="radio" name="tipoUsuario" value="transportador">
              Transportador
            </label>
          </div>
        </div>

        <div class="form-group floating animated-input">
          <input type="text" class="form-input" placeholder=" " required>
          <label class="form-label">
            <i class="fas fa-phone"></i>
            Telefone
          </label>
          <div class="input-focus-line"></div>
        </div>

        <div class="form-group floating animated-input">
          <select class="form-input" required>
            <option value="" disabled selected hidden></option>
            <option>SP</option>
            <option>RJ</option>
            <option>MG</option>
            <option>RS</option>
          </select>
          <label class="form-label">
            <i class="fas fa-flag"></i>
            Estado
          </label>
          <div class="input-focus-line"></div>
        </div>

        <div class="form-group floating animated-input">
          <input type="text" class="form-input" placeholder=" " required>
          <label class="form-label">
            <i class="fas fa-city"></i>
            Cidade
          </label>
          <div class="input-focus-line"></div>
        </div>

        <div class="form-group floating animated-input">
          <input type="text" class="form-input" placeholder=" " required>
          <label class="form-label">
            <i class="fas fa-map-marker-alt"></i>
            Endereço
          </label>
          <div class="input-focus-line"></div>
        </div>

        <button type="submit" class="btn-login animated-input">
          <span class="btn-text">Cadastrar</span>
          <i class="fas fa-user-plus btn-icon"></i>
          <div class="btn-shine"></div>
        </button>

        <div class="register-button animated-input">
          <p>
            Já possui conta?
            <a routerLink="/auth/login">Entrar</a>
          </p>
        </div>

      </form>

      <div class="login-footer">
        <p>
          Voltar para
          <a routerLink="/">página inicial</a>
        </p>
      </div>

    </div>
  </div>
</div>
