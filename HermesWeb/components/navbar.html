<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Navbar Hermes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/navbar.css">
  <link rel="stylesheet" href="/assets/css/footer.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
  <link rel="shortcut icon" href="/assets/favicon/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/assets/favicon/site.webmanifest">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <img src="/assets/images/LogoOficial.png" alt="Logo Hermes" class="logo-img">
        <span>HERMES</span>
      </a>

      <div class="nav-menu">
        <a href="dashboard-clientes.html" class="nav-link">
          <i class="fas fa-tachometer-alt"></i> Painel
        </a>

        <a href="solicitar-frete.html" class="nav-link">
          <i class="fas fa-plus-circle"></i> Solicitar Frete
        </a>

        <a href="meus-fretes.html" class="nav-link">
          <i class="fas fa-list"></i> Meus Fretes
        </a>

        <div class="user-menu">
          <a href="notificacoes.html" class="notification-link" title="Notificações">
            <i class="fas fa-bell"></i>
            <span class="notification-badge">3</span>
          </a>

          <a href="perfil.html" class="user-name perfil-link" title="Meu Perfil">
            <i class="fas fa-user-circle"></i>
            <span class="user-name-text">Thales Marconsini</span>
          </a>

          <a href="login.html" class="nav-link btn-nav logout-btn" title="Sair">
            <i class="fas fa-sign-out-alt"></i>
            <span class="logout-text">Sair</span>
          </a>
        </div>
      </div>

      <div class="nav-toggle" id="navToggle">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </div>
  </nav>

  <main class="demo-content">
    <h1>Preview da Navbar Hermes</h1>
    <p>Essa versão está em HTML puro, com conteúdo estático de exemplo para visualização.</p>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const navToggle = document.getElementById('navToggle');
      const navMenu = document.querySelector('.nav-menu');

      if (navToggle && navMenu) {
        navToggle.addEventListener('click', function() {
          navMenu.classList.toggle('active');
          navToggle.classList.toggle('active');
        });
      }

      const navLinks = document.querySelectorAll('.nav-link');
      navLinks.forEach(link => {
        link.addEventListener('click', function() {
          navMenu.classList.remove('active');
          navToggle.classList.remove('active');
        });
      });

      document.addEventListener('click', function(event) {
        if (
          navMenu &&
          navMenu.classList.contains('active') &&
          !navMenu.contains(event.target) &&
          !navToggle.contains(event.target)
        ) {
          navMenu.classList.remove('active');
          navToggle.classList.remove('active');
        }
      });
    });
  </script>

</body>
</html>
